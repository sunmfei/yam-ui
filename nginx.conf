# =========================================================
# YAM 项目 Nginx 配置（修复 CSRF 403 问题）
#
# 关键改进：
# 1. /auth/api/auth/login 单独处理，避免 CSRF 验证
# 2. Cookie 正确透传
# 3. CORS 配置完善
# =========================================================

server {
    listen 53001;
    server_name 192.168.31.4;

    # ========================
    # 前端目录
    # ========================
    root /usr/share/nginx/html;
    index index.html;

    # ========================
    # Gzip 压缩
    # ========================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml application/x-javascript;

    # ========================
    # 客户端请求体大小限制（文件上传）
    # ========================
    client_max_body_size 100m;

    # ========================
    # 日志配置
    # ========================
    access_log /var/log/nginx/yam_access.log;
    error_log /var/log/nginx/yam_error.log warn;

    # ========================
    # 静态资源缓存（长期缓存）
    # ========================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ========================
    # HTML 不缓存
    # ========================
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # ========================
    # SPA 路由支持
    # ========================
    location / {
        try_files $uri $uri/ /index.html;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # ========================
    # 登录接口特殊处理（避免 CSRF 403 问题）
    # 必须在 /auth/ 之前定义，优先匹配
    # ========================
    location = /auth/api/auth/login {
        proxy_pass http://192.168.31.4:48088;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cookie 透传（重要）
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # CORS 配置
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "POST,OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Requested-With,Accept,Origin" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin;
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Allow-Methods "POST,OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Requested-With,Accept,Origin";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ========================
    # AUTH 代理（其他认证相关接口）
    # ========================
    location /auth/ {
        proxy_pass http://192.168.31.4:48088;

        # 基础代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # 登录/鉴权必须透传
        proxy_set_header Referer $http_referer;
        proxy_set_header Origin $http_origin;

        # Cookie 透传（重要：Session 认证需要）
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        # HTTP 1.1 保持连接
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
        proxy_busy_buffers_size 16k;

        # CORS 配置
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS,PATCH" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Requested-With,Accept,Origin,Cache-Control,X-CSRF-Token" always;
        add_header Access-Control-Expose-Headers "X-CSRF-Token,Authorization" always;

        # 预检请求处理
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin;
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS,PATCH";
            add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Requested-With,Accept,Origin,Cache-Control,X-CSRF-Token";
            add_header Access-Control-Max-Age 3600;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ========================
    # API 代理（Gateway）
    # ========================
    location /api/ {
        # 去掉 /api 前缀，转发到 Gateway
        rewrite ^/api/(.*) /$1 break;

        proxy_pass http://192.168.31.4:48088;

        # 基础代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Cookie 透传
        proxy_set_header Cookie $http_cookie;
        proxy_pass_header Set-Cookie;

        # HTTP 1.1 保持连接
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 缓冲设置
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 8k;
        proxy_busy_buffers_size 16k;

        # CORS 配置
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS,PATCH" always;
        add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Requested-With,Accept,Origin,Cache-Control" always;
        add_header Access-Control-Expose-Headers "Content-Disposition" always;

        # 预检请求处理
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $http_origin;
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Allow-Methods "GET,POST,PUT,DELETE,OPTIONS,PATCH";
            add_header Access-Control-Allow-Headers "Authorization,Content-Type,X-Requested-With,Accept,Origin,Cache-Control";
            add_header Access-Control-Max-Age 3600;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ========================
    # WebSocket 支持（可选）
    # ========================
    location /ws/ {
        proxy_pass http://192.168.31.4:48088;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket 超时设置（可以更长）
        proxy_connect_timeout 60s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # ========================
    # 健康检查端点
    # ========================
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ========================
    # Nginx 状态监控（可选，建议限制访问）
    # ========================
    location /nginx-status {
        stub_status on;
        access_log off;
        # allow 127.0.0.1;
        # deny all;
    }

    # ========================
    # 错误页
    # ========================
    error_page 404 /index.html;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
