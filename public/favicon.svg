<!--
文件核心作用：
Sun 品牌文字 SVG 图标（双层阴影立体风格）

模块职责划分：
- 背景层：透明画布
- 阴影层：红棕色偏移投影
- 主视觉层：金黄色品牌字体
- 对齐层：整体居中布局控制

整体结构说明：
采用双文本叠加实现立体视觉效果，通过轻微位移形成品牌厚重感

对外能力或接口说明：
可直接用于 favicon / logo / banner 图标资源

关键设计点总结：
- 双层 text 实现立体阴影
- 居中对齐保证多场景适配
- 无外部依赖，纯 SVG 可用
-->

<svg width="128" height="128" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <!-- 背景 -->
  <rect width="512" height="512" fill="transparent"/>

  <!-- 阴影层 -->
  <text
    x="50%"
    y="50%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-size="280"
    font-family="Georgia, serif"
    font-weight="700"
    fill="#7A1E1E"
    transform="translate(15,15)"
  >
    Sun
  </text>

  <!-- 主视觉层 -->
  <text
    x="50%"
    y="50%"
    text-anchor="middle"
    dominant-baseline="middle"
    font-size="280"
    font-family="Georgia, serif"
    font-weight="700"
    fill="#FFC107"
  >
    Sun
  </text>

</svg>
