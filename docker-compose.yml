# =========================================================
# 文件核心作用：
# 前端生产环境容器编排（Nginx 静态服务）
#
# 模块职责划分：
# 1. 构建前端 dist
# 2. 运行 nginx 容器
#
# 整体结构说明：
# build → image → container → nginx服务
#
# 对外能力或接口说明：
# 提供 HTTP 前端访问服务
#
# 关键设计点总结：
# 单服务生产模式
# 无 Vite dev
# 可重复部署
# =========================================================

services:
  yam-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${PROJECT_NAME:-yam-ui}:${VERSION:-latest}
    container_name: ${PROJECT_NAME:-yam}-ui

    ports:
      - "${PORT:-53001}:53001"

    environment:
      - NODE_ENV=production
      - GATEWAY_UPSTREAM=${GATEWAY_UPSTREAM:-yam-gateway:48088}

    restart: unless-stopped
    networks:
      - yam-network

networks:
  yam-network:
    external: true
    name: ${PROJECT_NAME:-yam}-network
